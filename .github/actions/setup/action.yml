name: Setup
description: Setup Node.js and install dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22.14.0"
        cache: yarn
    - name: Install dependencies
      shell: bash
      run: yarn install --immutable
    - name: Generate Prisma client
      shell: bash
      run: yarn prisma:generate
